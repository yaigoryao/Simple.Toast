name: Nuget push on main push

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI workloads
        run: |
          dotnet workload install ios
          dotnet workload install maccatalyst
          dotnet workload install maui
      
      - name: Get latest NuGet version
        id: get-latest-version
        shell: pwsh
        run: |
          $queryUrl = "https://azuresearch-usnc.nuget.org/query?q=packageid:Simple.Toast&prerelease=true&semVerLevel=2.0.0"
          try {
            $response = Invoke-RestMethod -Uri $queryUrl -ErrorAction Stop
            if ($response.totalHits -gt 0) {
              $latest = $response.data[0].version
            } else {
              $latest = "0.0.0"
            }
          } catch {
            Write-Error "Failed to query NuGet Search API: $_"
            exit 1
          }
          echo "latest=$latest" >> $env:GITHUB_OUTPUT

      - name: Get current version from .csproj
        id: get-current-version
        shell: pwsh
        run: |
          $csprojPath = './Simple.Toast/Simple.Toast.csproj'
          if (-not (Test-Path $csprojPath)) {
            Write-Error "File not found: $csprojPath"
            exit 1
          }
          [xml]$csproj = Get-Content $csprojPath
          $current = $csproj.Project.PropertyGroup.Version
          if (-not $current) { $current = $csproj.Project.PropertyGroup.VersionPrefix }
          if (-not $current) {
            Write-Error "Version tag not found in .csproj"
            exit 1
          }
          echo "current=$current" >> $env:GITHUB_OUTPUT

      - name: Compare versions
        id: compare-versions
        env:
          LATEST: ${{ steps.get-latest-version.outputs.latest }}
          CURRENT: ${{ steps.get-current-version.outputs.current }}
        shell: pwsh
        run: |
          $update = $env:LATEST -ne $env:CURRENT
          $updateStr = $update.ToString().ToLower()
          echo "update=$updateStr" >> $env:GITHUB_OUTPUT

      - name: Pack project
        if: steps.compare-versions.outputs.update == 'true'
        run: dotnet pack -c Release -o output
        working-directory: ./Simple.Toast

      - name: Push NuGet package
        if: steps.compare-versions.outputs.update == 'true'
        env:
          NUGET_KEY: ${{ secrets.SIMPLE_TOAST_KEY }}
        shell: pwsh
        run: |
          $package = Get-ChildItem output/*.nupkg | Select-Object -First 1
          if (-not $package) {
            Write-Error "No .nupkg file found in output/"
            exit 1
          }
          dotnet nuget push $package.FullName --api-key $env:NUGET_KEY --source https://api.nuget.org/v3/index.json
        working-directory: ./Simple.Toast
